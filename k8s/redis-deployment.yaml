apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowstate-redis
  namespace: flowstate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flowstate-redis
  template:
    metadata:
      labels:
        app: flowstate-redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false

