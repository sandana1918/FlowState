apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flowstate
  namespace: flowstate
spec:
  rules:
    - host: flowstate.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flowstate-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: flowstate-backend
                port:
                  number: 5000

