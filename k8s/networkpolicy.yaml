apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flowstate-network
  namespace: flowstate
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: flowstate-frontend
      ports:
        - protocol: TCP
          port: 5000
    - from:
        - podSelector:
            matchLabels:
              app: flowstate-backend
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: flowstate-postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: flowstate-redis
      ports:
        - protocol: TCP
          port: 6379

