apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowstate-backend
  namespace: flowstate
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flowstate-backend
  template:
    metadata:
      labels:
        app: flowstate-backend
    spec:
      serviceAccountName: flowstate-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: backend
          image: flowstate-backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: flowstate-config
            - secretRef:
                name: flowstate-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

