apiVersion: v1
kind: ConfigMap
metadata:
  name: flowstate-config
  namespace: flowstate
data:
  PORT: "5000"
  NODE_ENV: "production"
  REDIS_URL: "redis://flowstate-redis:6379"
  DATABASE_URL: "postgresql://flowstate:flowstate@flowstate-postgres:5432/flowstate"
  DOCKER_SOCKET_PATH: "//./pipe/docker_engine"
  ANOMALY_ZSCORE_THRESHOLD: "2.5"
  ANOMALY_WINDOW_SIZE: "20"
  CORRELATION_WINDOW_MINUTES: "30"
  METRIC_COLLECTION_INTERVAL: "15"
  SERVICE_GRAPH_PATH: "./service-dependencies.json"
